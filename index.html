    <main style="padding: 4rem 0;">
      <section style="text-align: center; margin-bottom: 4rem;">
        <h1>Secure. Fast. <span class="neon-text">Premium OTC.</span></h1>
        <p>Execute large volume cryptocurrency trades instantly with institutional-grade security.</p>
      </section>

      <section class="glass-card" style="max-width: 800px; margin: 0 auto;">
        <h2 style="margin-bottom: 2rem; text-align: center;">Initiate Trade</h2>
        
        <form id="orderForm">
          <div class="grid-layout">
            <div class="form-group">
              <label>Full Name</label>
              <input type="text" id="name" required placeholder="John Doe">
            </div>
            <div class="form-group">
              <label>Email Address</label>
              <input type="email" id="email" required placeholder="john@example.com">
            </div>
          </div>

          <div class="grid-layout">
            <div class="form-group">
              <label>WhatsApp Number</label>
              <input type="tel" id="whatsapp" required placeholder="+1234567890">
            </div>
            <div class="form-group">
              <label>Select Coin</label>
              <select id="coin" required>
                <option value="USDT">USDT (Tether)</option>
                <option value="BTC">Bitcoin</option>
                <option value="ETH">Ethereum</option>
                <option value="SOL">Solana</option>
              </select>
            </div>
          </div>

          <div class="grid-layout">
            <div class="form-group">
              <label>Network</label>
              <select id="network" required>
                <option value="TRC20">TRC20</option>
                <option value="ERC20">ERC20</option>
                <option value="BEP20">BEP20</option>
              </select>
            </div>
            <div class="form-group">
              <label>Amount Wanted</label>
              <input type="number" id="amount" required placeholder="1000">
            </div>
          </div>

          <div class="form-group">
            <label>Receiving Wallet Address</label>
            <input type="text" id="wallet" required placeholder="0x...">
          </div>

          <button type="submit" class="btn btn-primary" id="submitBtn">Submit Order Request</button>
        </form>
      </section>
    </main>
  </div>
